name: Build

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'docs/**'

jobs:
  windows:
    runs-on: windows-latest
    continue-on-error: false
    timeout-minutes: 45

    env:
      # MARKTEXT_IS_STABLE: 1
      MARKTEXT_EXIT_ON_ERROR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GYP_MSVS_VERSION: 2022

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Setup MSVC context
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true
          cache: yarn
          cache-dependency-path: yarn.lock

      # Workaround: Fix native build failure due to outdated node-gyp version.
      - name: Fix node-gyp
        run: |
          npm install --global node-gyp@9.4.1
          npm config set msvs_version 2022 --global
          $nodeGypPath = "$(npm prefix -g)\node_modules\node-gyp\bin\node-gyp.js"
          echo "npm_config_node_gyp=$nodeGypPath" >> $env:GITHUB_ENV
          node-gyp install
        shell: pwsh

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cacheNodeModules
        with:
          path: ${{ github.workspace }}\node_modules
          key: ${{ runner.os }}-node_modules-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}
          restore-keys: |
            ${{ runner.os }}-node_modules-cache-v2-

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: ${{ runner.os }}-electron-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Cache Electron-Builder
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\cache
          key: ${{ runner.os }}-electron-builder-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Install dependencies
        # Windows worker fail sometimes because a module cannot be found.
        # if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        run: yarn install --check-files --frozen-lockfile

      - name: Lint
        run: |
          yarn run lint
          yarn run validate-licenses

      - name: Run unit and E2E tests
        run: yarn run test

      - name: Build
        run: yarn build:bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkText-Windows-Prebuild
          path: build/*.exe
